<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JSON 图片批量打包</title>
  <style>
    :root {
      --bg: #f4f6f9;
      --card: #fff;
      --text: #1c1e21;
      --muted: #5f6368;
      --border: #e0e4ea;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --radius: 12px;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      line-height: 1.55;
      color: var(--text);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      padding: 2rem 1rem 3rem;
    }

    .wrap {
      max-width: 32rem;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 1.5rem 1.5rem 1.25rem;
    }

    h1 {
      margin: 0 0 0.35rem;
      font-size: 1.2rem;
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    .lead {
      margin: 0 0 1rem;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .code {
      font-family: ui-monospace, "Cascadia Code", "Consolas", monospace;
      font-size: 0.82rem;
      background: #f1f5f9;
      color: #0f172a;
      padding: 0.12rem 0.35rem;
      border-radius: 4px;
    }

    .meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1rem;
      padding: 0.65rem 0.75rem;
      background: #f8fafc;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    button.primary {
      width: 100%;
      padding: 0.65rem 1rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
    }

    button.primary:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    button.primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #status {
      margin-top: 1rem;
      font-size: 0.88rem;
      color: var(--text);
    }

    progress {
      width: 100%;
      height: 0.45rem;
      margin-top: 0.5rem;
      accent-color: var(--accent);
    }

    #log {
      margin-top: 0.85rem;
      font-size: 0.75rem;
      line-height: 1.45;
      color: var(--muted);
      max-height: 10rem;
      overflow: auto;
      padding: 0.65rem 0.75rem;
      background: #fafbfc;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-family: ui-monospace, "Cascadia Code", "Consolas", monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }

    footer.note {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>JSON 图片批量打包</h1>
      <p class="lead">
        读取全局 <span class="code">jsonData</span>，按配置的字段收集图片 URL，打包为单个 ZIP 下载。
      </p>
      <div class="meta" id="metaLine">正在检测数据…</div>
      <button type="button" class="primary" id="startBtn">开始打包下载</button>
      <div id="status"></div>
      <progress id="progress" value="0" max="100" hidden></progress>
      <div id="log" aria-live="polite"></div>
    </div>
    <p class="note">
      在下方先引入你的数据脚本（需包含 <span class="code">const jsonData = { … }</span>），再引入
      <span class="code">index.js</span>。
    </p>
  </div>
  <!-- \chrome.exe --disable-web-security --user-data-dir="C:\ChromeTemp -->
  <!-- 数据：导出 jsonData，结构为 { items: [ { image: "https://..." }, ... ] } -->
  <!-- <script src="./your-data.js"></script> -->
  <script src="./index.js"></script>
</body>

</html>
